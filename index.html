<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewpoint" content="width=device-width,initial-scale=1.0" />
        <title>My Project</title>

        <!-- Font Awesome 5 -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <!-- Bootstrap css1 js1 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Style.css -->
        <link href="./css/style.css" rel="stylesheet" type="text/css" />

    </head>
    <body>

        <div class="container">

            <div class="row">

                <div class="col-12 col-md-6">
                    <a href="javascript:void(0);" class="btn app-btn">
                        <img src="./img/calculator.png" class="app-img" alt="calculator"/>
                    </a>
                </div>

                <div class="col-12 col-md-6">
                    <a href="javascript:void(0);" class="btn app-btn">
                        <img src="./img/calendar.png" class="app-img" alt="calendar"/>
                    </a>
                </div>

                <div class="col-12 col-md-6">
                    <a href="javascript:void(0);" class="btn app-btn">
                        <img src="./img/clock.png" class="app-img" alt="clock"/>
                    </a>
                </div>

                <div class="col-12 col-md-6">
                    <a href="javascript:void(0);" class="btn app-btn">
                        <img src="./img/notes.png" class="app-img" alt="notes"/>
                    </a>
                </div>

            </div>

        </div>

        <div class="content">

            <nav class="navbar navbar-expand-md navabr-primary bg-light">
                <div class="container-fluid justify-content-between">
                    <a href="javascript:void(0);" class="navbar-brand"><span class="app-name">aaa</span></a>
                    <button type="button" class="btn-close"></button>
                </div>
            </nav>

            <div class="app">

                <div id="calculator" class="container-fluid">

                    <div class="container-fluid">
                        <div class="row display">
                            <span class="col-1 cal-sign">+</span>
                            <span class="col-11 cal-num">999999999999</span>
                        </div>
                        <hr/>
                        <div class="row numpad">
                            <button type="button" class="col-3 key">C</button>
                            <button type="button" class="col-3 key">Del</button>
                            <button type="button" class="col-3 key">/</button>
                            <button type="button" class="col-3 key">*</button>
                            <button type="button" class="col-3 key">7</button>
                            <button type="button" class="col-3 key">8</button>
                            <button type="button" class="col-3 key">9</button>
                            <button type="button" class="col-3 key">-</button>
                            <button type="button" class="col-3 key">4</button>
                            <button type="button" class="col-3 key">5</button>
                            <button type="button" class="col-3 key">6</button>
                            <button type="button" class="col-3 key">+</button>
                            <button type="button" class="col-3 key">1</button>
                            <button type="button" class="col-3 key">2</button>
                            <button type="button" class="col-3 key">3</button>
                            <button type="button" class="col-3 key">=</button>
                            <button type="button" class="col-12 key">0</button>
                        </div>
                    </div>

                </div>

                <div id="calendar" class="container-fluid">

                    <div class="container-fluid">

                    </div>

                </div>

            </div>

        </div>

        <!-- Bootstrap css1 js1 -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Javascript -->
        <script src="./js/app.js" type="text/javascript"></script>

    </body>
</html>
